services:
  mongodb:
    image: mongo:8
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    ports:
      - "27018:27017"
    volumes:
      - mongodb-data-new:/data/db
    networks:
      - mongodb-network

volumes:
  mongodb-data-new:

networks:
  mongodb-network:
    driver: bridge